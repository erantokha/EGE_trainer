<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net;">
<title>trim test</title></head><body><div id="s">…</div>
<script type="module">
import { trimSnapshot } from '/app/providers/konspekts.js';
function makeBlob(w,h,bg,content){const c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');x.fillStyle=bg;x.fillRect(0,0,w,h);if(content){x.fillStyle=content.color;x.fillRect(40,content.y0,w-80,content.y1-content.y0);}return new Promise(r=>c.toBlob(r,'image/png'));}
async function dims(blob){const b=await createImageBitmap(blob);const r={w:b.width,h:b.height};b.close&&b.close();return r;}
(async()=>{
  const out={};
  try{
    // 1) контент в середине белого полотна → сильно короче, ширина та же
    const t1=await trimSnapshot(await makeBlob(800,2000,'#ffffff',{y0:800,y1:1100,color:'#111111'}));
    out.t1=await dims(t1);
    // 2) полностью пустой белый → без изменений
    const t2=await trimSnapshot(await makeBlob(800,600,'#ffffff',null));
    out.t2=await dims(t2);
    // 3) тёмная тема: светлый контент на тёмном фоне → короче
    const t3=await trimSnapshot(await makeBlob(800,2000,'#1a1a1a',{y0:900,y1:1000,color:'#eeeeee'}));
    out.t3=await dims(t3);
    // полная обрезка: ширина тоже режется по контенту (rect 40..760 → ~752 + поля)
    out.ok = out.t1.w>600 && out.t1.w<800 && out.t1.h>250 && out.t1.h<420
          && out.t2.w===800 && out.t2.h===600
          && out.t3.w>600 && out.t3.w<800 && out.t3.h>80 && out.t3.h<200;
  }catch(e){out.error=String(e&&(e.message||e));out.ok=false;}
  window.__TRIM__=out; document.getElementById('s').textContent=JSON.stringify(out);
})();
</script></body></html>
