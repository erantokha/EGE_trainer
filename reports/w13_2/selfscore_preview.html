<p class="note">W13.2b — контрол самооценки 0/1/2 после эталона (реальный модуль part2_render.js + part2.css). Запись идёт через RPC submit_part2_self_score_v1 (здесь onSave — заглушка).</p>
<div class="run-body"><div class="task-list" id="taskList"></div></div>
<script type="module">
import { renderPart2Stem, buildPart2EtalonBlock, buildPart2SelfScore, mkEl } from '/tasks/part2_render.js';
const man = await (await fetch('/content/tasks/part2/13/13.trig.factor.json')).json();
const proto = man.types[0].prototypes[0];
const list = document.getElementById('taskList');
const card = mkEl('div','task-card'); card.appendChild(mkEl('div','task-num','1'));
const stem = mkEl('div','task-stem'); renderPart2Stem(stem, proto.stem); card.appendChild(stem);
const ans = mkEl('div','task-ans');
ans.appendChild(buildPart2EtalonBlock(proto.solution, proto.answer));
ans.appendChild(buildPart2SelfScore({ savedScore: null, onSave: async () => {} }));
card.appendChild(ans); list.appendChild(card);
// показать раскрытый эталон + выбрать самооценку «1» для скриншота
document.querySelector('.part2-etalon-btn')?.click();
document.querySelectorAll('.part2-selfscore-btn')[1]?.click();
if (window.MathJax?.startup){ await window.MathJax.startup.promise; await window.MathJax.typesetPromise(); }
document.body.dataset.ready='1';
</script></body></html>
