<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
  <meta name="app-build" content="2026-06-13-6-195819">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- ТА ЖЕ CSP, что в trainer.html: img-src БЕЗ blob: → проверяем, что data:-URL проходит -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>proto: paste image + move/resize</title>
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,sans-serif;background:#f4f5f7}
  .hint{padding:12px;color:#555}
  .imglayer{position:fixed;inset:0;z-index:1;pointer-events:none}
  .sticker{position:absolute;pointer-events:auto;border:1px solid #2d7cf6;box-shadow:0 2px 12px rgba(0,0,0,.25);touch-action:none;cursor:move;user-select:none}
  .sticker img{display:block;width:100%;height:100%;pointer-events:none;user-select:none}
  .sticker .h{position:absolute;width:16px;height:16px;right:-8px;bottom:-8px;background:#2d7cf6;border:2px solid #fff;border-radius:50%;cursor:nwse-resize;touch-action:none}
  .sticker.sel{outline:2px dashed #2d7cf6;outline-offset:2px}
</style>
</head>
<body>
  <div class="hint">Скопируй любую картинку и нажми Ctrl/Cmd+V. Затем тяни картинку (двигать) и синий кружок (масштаб).</div>
  <div class="imglayer" id="layer"></div>

<script>
const layer = document.getElementById('layer');
let lastPointer = { x: innerWidth/2, y: innerHeight/2 };
document.addEventListener('pointermove', (e)=>{ lastPointer = { x:e.clientX, y:e.clientY }; }, true);

// --- ядро: положить картинку из data:-URL, сделать draggable+resizable ---
function addImage(dataUrl) {
  const img = new Image();
  img.onload = () => {
    const maxW = Math.min(360, innerWidth*0.8);
    const ratio = img.naturalHeight / img.naturalWidth || 1;
    let w = Math.min(img.naturalWidth, maxW);
    let h = w * ratio;
    const st = document.createElement('div');
    st.className = 'sticker sel';
    st.style.width = w+'px'; st.style.height = h+'px';
    st.style.left = Math.max(0, lastPointer.x - w/2)+'px';
    st.style.top  = Math.max(0, lastPointer.y - h/2)+'px';
    const im = document.createElement('img'); im.src = dataUrl; im.draggable = false;
    const handle = document.createElement('span'); handle.className = 'h';
    st.appendChild(im); st.appendChild(handle);
    layer.appendChild(st);
    wireMove(st);
    wireResize(st, handle, ratio);
    window.__lastSticker = st;
  };
  img.onerror = () => { window.__imgError = true; };
  img.src = dataUrl; // data:-URL → разрешён img-src data:
}

// перетаскивание
function wireMove(st){
  st.addEventListener('pointerdown', (e)=>{
    if (e.target.classList.contains('h')) return; // ручка — отдельно
    e.preventDefault();
    const r = st.getBoundingClientRect();
    const off = { x: e.clientX - r.left, y: e.clientY - r.top };
    st.setPointerCapture(e.pointerId);
    const move = (ev)=>{ st.style.left = (ev.clientX - off.x)+'px'; st.style.top = (ev.clientY - off.y)+'px'; };
    const up = ()=>{ st.removeEventListener('pointermove', move); st.removeEventListener('pointerup', up); };
    st.addEventListener('pointermove', move); st.addEventListener('pointerup', up);
  });
}
// масштаб (угловая ручка, сохраняем пропорции)
function wireResize(st, handle, ratio){
  handle.addEventListener('pointerdown', (e)=>{
    e.preventDefault(); e.stopPropagation();
    const r = st.getBoundingClientRect();
    const start = { x: e.clientX, y: e.clientY, w: r.width };
    handle.setPointerCapture(e.pointerId);
    const move = (ev)=>{ const w = Math.max(24, start.w + (ev.clientX - start.x)); st.style.width = w+'px'; st.style.height = (w*ratio)+'px'; };
    const up = ()=>{ handle.removeEventListener('pointermove', move); handle.removeEventListener('pointerup', up); };
    handle.addEventListener('pointermove', move); handle.addEventListener('pointerup', up);
  });
}

// --- вставка из буфера: paste event (работает на HTTP по Ctrl/Cmd+V) ---
document.addEventListener('paste', (e) => {
  const items = (e.clipboardData && e.clipboardData.items) || [];
  for (const it of items) {
    if (it.kind === 'file' && it.type.startsWith('image/')) {
      e.preventDefault();
      const blob = it.getAsFile();
      const fr = new FileReader();
      fr.onload = () => addImage(fr.result); // result = data:-URL
      fr.readAsDataURL(blob);
      return;
    }
  }
});

// тест-хук: положить картинку напрямую (Playwright)
window.__addImage = addImage;
// тест-хук: эмулировать paste с blob
window.__pasteBlob = (blob) => { const fr = new FileReader(); fr.onload = ()=>addImage(fr.result); fr.readAsDataURL(blob); };
</script>
</body>
</html>
