name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check build/version sync
        run: node tools/check_build.mjs

      - name: Forbid eval/new Function in runtime
        run: node tools/check_no_eval.mjs

      - name: Check runtime catalog reads
        run: node tools/check_runtime_catalog_reads.mjs

      - name: Check runtime RPC registry
        run: node tools/check_runtime_rpc_registry.mjs

      - name: Check catalog DB sync
        # Только на push в main, не на PR — чтобы не блокировать ревью
        if: github.event_name == 'push'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node tools/check_catalog_sync.mjs
