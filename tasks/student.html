          var f=document.getElementById('htExamFill');if(f){var s=new Date(2026,8,1),sp=exam-s,p=sp>0?((today-s)/sp)*100:0;f.style.width=Math.max(0,Math.min(100,p)).toFixed(1)+'%';}

  <script type="module">
    const BUILD = document.querySelector('meta[name="app-build"]')?.content?.trim();
    const withV = (p) => BUILD ? `${p}${p.includes('?') ? '&' : '?'}v=${encodeURIComponent(BUILD)}` : p;

  <!-- WSF-restyle: обвязка сайдбара учителя — копия из home_teacher.html (open/close/overlay,
       синхронизация имени из #userMenuBtn, выход через скрытый #menuLogout, навигация). -->
  <script>
  (function () {
    var sidebar      = document.getElementById('htSidebar');
    var overlay      = document.getElementById('htSidebarOverlay');
    var sidebarClose = document.getElementById('htSidebarClose');
    var sidebarOpen  = document.getElementById('htSidebarOpen');
    var userBtn      = document.getElementById('htSidebarUserBtn');
    var logoutWrap   = document.getElementById('htSidebarLogoutWrap');
    var logoutBtn    = document.getElementById('htSidebarLogout');
    var userNameEl   = document.getElementById('htSidebarUserName');
    if (!sidebar) return;

    /* Открыть/закрыть сайдбар */
    function openSidebar() {
      sidebar.classList.add('open');
      document.body.classList.add('ht-sidebar-open');
      if (sidebarClose) sidebarClose.setAttribute('aria-expanded', 'true');
      if (sidebarOpen) sidebarOpen.setAttribute('aria-expanded', 'true');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      document.body.classList.remove('ht-sidebar-open');
      if (sidebarClose) sidebarClose.setAttribute('aria-expanded', 'false');
      if (sidebarOpen) sidebarOpen.setAttribute('aria-expanded', 'false');
      if (logoutWrap) logoutWrap.hidden = true;
    }

    if (sidebarClose) sidebarClose.addEventListener('click', function () {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });

    /* Гамбургер в шапке (мобилка) — открывает сайдбар */
    if (sidebarOpen) sidebarOpen.addEventListener('click', openSidebar);

    /* Тап по затемнению (мобилка, full-screen overlay) — закрывает сайдбар */
    if (overlay) overlay.addEventListener('click', closeSidebar);

    /* Синхронизировать имя из #userMenuBtn */
    function syncName() {
      var label = document.querySelector('#userMenuBtn .user-menu-btn-label');
      if (label && userNameEl) {
        var name = (label.textContent || '').trim();
        /* имя сайдбара ставит header.js (полное имя); инлайн-зеркало отключено */ void name;
      }
    }
    var nameObs = new MutationObserver(function () {
      var label = document.querySelector('#userMenuBtn .user-menu-btn-label');
      if (!label) return;
      nameObs.disconnect();
      syncName();
      new MutationObserver(syncName).observe(label, { childList: true, characterData: true, subtree: true });
    });
    nameObs.observe(document.body, { childList: true, subtree: true });

    /* Пользователь → «Выйти» */
    if (userBtn && logoutWrap) {
      userBtn.addEventListener('click', function () {
        var isOpen = !logoutWrap.hidden;
        logoutWrap.hidden = isOpen;
        userBtn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
      });
    }
    if (logoutBtn) {
      logoutBtn.addEventListener('click', function () {
        var orig = document.getElementById('menuLogout');
        if (orig) orig.click();
        closeSidebar();
      });
    }

    /* Навигация */
    var homeUrl = (function () {
      try {
        return /\/tasks(\/|$)/.test(location.pathname)
          ? new URL('../', location.href).toString()
          : new URL('./', location.href).toString();
      } catch (_) { return './'; }
    })();

    var navStudents = document.getElementById('htNavStudents');
    var navWorks    = document.getElementById('htNavWorks');
    var navProfile  = document.getElementById('htNavProfile');

    if (navStudents) navStudents.addEventListener('click', function () {
      location.href = homeUrl + 'tasks/my_students.html';
    });
    if (navWorks) navWorks.addEventListener('click', function () {
      location.href = homeUrl + 'tasks/my_students.html'; /* TODO: hw_teacher url */
    });
    if (navProfile) navProfile.addEventListener('click', function () {
      location.href = homeUrl + 'tasks/profile.html';
    });
  })();
  </script>
  <!-- WSF: контроллер сайдбара — СИНХРОННЫЙ (до первой отрисовки, без сетевого запроса):
       меню статично в HTML, здесь только восстановление рельса, роль профиля, активный пункт,
       клики и персист. Это устраняет мигание при навигации (меню не достраивается после paint). -->
  <script>
  (function () {
    var sb = document.getElementById('htSidebar');
    if (!sb) return;
    var nav = sb.querySelector('.ht-sidebar-nav');
    var docEl = document.documentElement;
    function isDesktop() { try { return window.matchMedia('(min-width:1025px)').matches; } catch (e) { return false; } }
    function homeUrl() { try { return /\/tasks(\/|$)/.test(location.pathname) ? new URL('../', location.href).toString() : new URL('./', location.href).toString(); } catch (e) { return './'; } }
    function pageKey() { var p = location.pathname; if (/\/home_student\.html$/.test(p)) return 'home_student'; if (/\/home_teacher\.html$/.test(p)) return 'home_teacher'; if (p === '/' || p === '' || /\/index\.html$/.test(p)) return 'root'; var m = p.match(/\/tasks\/([a-z0-9_]+)\.html$/i); return m ? m[1].toLowerCase() : ''; }
    function cachedRole() { try { for (var i = 0; i < sessionStorage.length; i++) { var k = sessionStorage.key(i); if (k && k.indexOf('ege_profile_role:') === 0) { var v = (sessionStorage.getItem(k) || '').trim().toLowerCase(); if (v) return v === 'teacher' ? 'teacher' : 'student'; } } var lr = (localStorage.getItem('ege_role') || '').trim().toLowerCase(); if (lr) return lr === 'teacher' ? 'teacher' : 'student'; } catch (e) {} return null; }
    function menuStatsRole() { var el = document.getElementById('menuStats'); if (!el) return null; var t = (el.textContent || '').trim(); if (!t) return null; return /ученик/i.test(t) ? 'teacher' : null; /* F3: не дефолтить в student при неопределённой роли */ }

    // 1) Профиль (универсальная страница): роль -> body[data-home-variant] СИНХРОННО (до paint).
    var auto = sb.getAttribute('data-sidebar-role') === 'auto';
    if (auto) { var r0 = cachedRole(); if (r0) document.body.setAttribute('data-home-variant', r0); }

    // 2) Восстановление состояния рельса (десктоп). Визуально рельс уже раскрыт через html.ht-rail-open
    //    (head-скрипт, до первой отрисовки) — здесь синхронизируем «настоящие» классы для логики
    //    тоггла/клиренса, без визуальных изменений (значения те же) → без transition.
    try {
      if (isDesktop() && localStorage.getItem('ege_sidebar_open') !== '0') {
        sb.classList.add('open'); document.body.classList.add('ht-sidebar-open');
        docEl.classList.add('ht-rail-open');
      }
    } catch (e) {}

    // 3) Активный пункт — по data-match среди ВИДИМЫХ пунктов.
    function markActive() { var key = pageKey(); var it = nav ? nav.querySelectorAll('.ht-sidebar-item') : []; for (var i = 0; i < it.length; i++) { var m = it[i].getAttribute('data-match') || ''; it[i].classList.toggle('active', !!m && m === key); } }
    markActive();

    // 4) Клики — по data-href.
    if (nav) { var its = nav.querySelectorAll('.ht-sidebar-item[data-href]'); for (var j = 0; j < its.length; j++) { (function (btn) { btn.addEventListener('click', function () { try { location.href = homeUrl() + btn.getAttribute('data-href'); } catch (e) {} }); })(its[j]); } }

    // 5) Синк html.ht-rail-open с .open + персист (только десктоп). Пользовательские открытие/закрытие
    //    анимируются нормально (это желаемо); мигание было только при ЗАГРУЗКЕ — оно убрано head-скриптом.
    try {
      new MutationObserver(function () {
        if (!isDesktop()) return;
        var open = sb.classList.contains('open');
        docEl.classList.toggle('ht-rail-open', open);
        try { localStorage.setItem('ege_sidebar_open', open ? '1' : '0'); } catch (e) {}
      }).observe(sb, { attributes: true, attributeFilter: ['class'] });
    } catch (e) {}

    // 6) Профиль: уточняем роль (cachedRole — приоритет; menuStatsRole — только запасной, т.к.
    //    у header.js до резолва #menuStats="Статистика" → давал ложный student). variant + active.
    if (auto) {
      var fix = function () { var nr = cachedRole() || menuStatsRole(); if (nr && nr !== document.body.getAttribute('data-home-variant')) { document.body.setAttribute('data-home-variant', nr); markActive(); } };
      var ms = document.getElementById('menuStats'); if (ms) { try { new MutationObserver(fix).observe(ms, { childList: true, characterData: true, subtree: true }); } catch (e) {} }
      try { new MutationObserver(function () { if (document.getElementById('menuStats')) fix(); }).observe(document.body, { childList: true, subtree: true }); } catch (e) {}
      try { window.addEventListener('app-auth-changed', fix); } catch (e) {}
      setTimeout(fix, 1200); setTimeout(fix, 2600);
    }
  })();
  </script>
