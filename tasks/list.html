    <title>Тренажер ЕГЭ — список задач</title>
  
    <script id="sentry-loader"
      src="https://js.sentry-cdn.com/931c8cc8254b6dcb3de991c6c9844397.min.js"
      crossorigin="anonymous"></script>

    <script>
    (function () {
      function boot() {
        if (!window.Sentry || typeof window.Sentry.init !== 'function') return;
        if (window.__SENTRY_INITED__) return;
        window.__SENTRY_INITED__ = true;

        var buildMeta = document.querySelector('meta[name="app-build"]');
        var release = buildMeta ? buildMeta.getAttribute('content') : 'unknown';
        var env = (location.hostname === 'ege-trainer.ru') ? 'production' : 'staging';

        var integrations = [];
        try {
          if (window.Sentry.breadcrumbsIntegration) {
            integrations.push(window.Sentry.breadcrumbsIntegration({
              console: true,
              dom: true,
              fetch: true,
              xhr: true,
              history: true,
              sentry: true
            }));
          }
          if (window.Sentry.browserApiErrorsIntegration) {
            integrations.push(window.Sentry.browserApiErrorsIntegration());
          }
          if (window.Sentry.globalHandlersIntegration) {
            integrations.push(window.Sentry.globalHandlersIntegration({
              onerror: true,
              onunhandledrejection: true
            }));
          }
        } catch (e) {}

        var opts = {
          release: release,
          environment: env,
          maxBreadcrumbs: 100,
          initialScope: { tags: { page: location.pathname } },
          beforeSend: function (event) {
            try {
              if (event && event.request) {
                if (event.request.url && event.request.url.indexOf('?') !== -1) {
                  event.request.url = event.request.url.split('?')[0];
                }
                if (event.request.headers) {
                  delete event.request.headers.Authorization;
                  delete event.request.headers.authorization;
                }
                delete event.request.query_string;
              }
            } catch (e) {}
            return event;
          }
        };

        if (integrations.length) opts.integrations = integrations;
        window.Sentry.init(opts);
      }

      if (window.Sentry && typeof window.Sentry.onLoad === 'function') {
        window.Sentry.onLoad(boot);
      } else {
        var s = document.getElementById('sentry-loader');
        if (s) s.addEventListener('load', boot);
        if (window.Sentry) boot();
      }
    })();
    </script>


    
    <link rel="stylesheet" href="./trainer.css?v=2026-04-07-7" />
    <script src="./theme.js?v=2026-04-07-7" defer></script>

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)'], ['$', '$']]
        },
        svg: {
          fontCache: 'local'
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-svg.js" async></script>
  </head>

  <body>
    <main class="container">
      <!-- Основной контейнер, в который list.js будет рендерить список задач -->
      <section id="runner">
        <div class="panel">
          <header id="appHeader" class="page-head">
            <div class="crumb">
              Список задач
            </div>
            <button id="printBtn" type="button" class="btn small print-btn" data-header-extra="1" data-tip="Печать">
              <svg class="print-btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="6 9 6 2 18 2 18 9"/>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                <rect x="6" y="14" width="12" height="8"/>
              </svg>
              <span class="print-btn-label">Печать</span>
            </button>
            <div class="theme-toggle" data-header-extra="1">
              <input
                type="checkbox"
                id="themeToggle"
                class="theme-toggle-input"
                aria-label="Переключить тему"
              >
              <label for="themeToggle" class="theme-toggle-label">
                <span class="theme-toggle-icon theme-toggle-icon-light">☀</span>
                <span class="theme-toggle-icon theme-toggle-icon-dark">🌙</span>
              </label>
            </div>

          </header>
          <script type="module">
  const BUILD = document.querySelector('meta[name="app-build"]')?.content?.trim();
  const withV = (p) => BUILD ? `${p}${p.includes('?') ? '&' : '?'}v=${encodeURIComponent(BUILD)}` : p;
  const inTasks = /\/tasks(\/|$)/.test(location.pathname);
  const rel = inTasks ? '../' : './';
  import(withV(rel + 'app/ui/header.js')).then((m) => m.initHeader({ isHome: !inTasks }));
  import(withV(rel + 'app/ui/print_btn.js')).then((m) => m.initPrintBtn());
</script>


          <div class="run-body">
            <p>
              Задачи загружаются на основе выбранных разделов и тем.
              Если список не появился, убедитесь, что вы сделали выбор на стартовой странице.
            </p>
            <noscript>
              Для отображения списка задач необходим JavaScript.
            </noscript>
          </div>
        </div>
      </section>

      <!-- Резервный блок summary: list.js его просто скрывает, но он может понадобиться для
           совместимости со стилями/разметкой других страниц -->
      <section id="summary" class="hidden">
        <div class="panel">
          <div class="run-head">
            <div class="crumb">
              Итоги
            </div>
          </div>
          <div class="run-body">
            <p>
              Здесь может отображаться дополнительная информация по выбранным задачам.
            </p>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./list.js?v=2026-04-07-7"></script>
  </body>
</html>
