      try { attempts = parseInt(sessionStorage.getItem(SS_KEY) || '0', 10) || 0; } catch (e) {}

          try { sessionStorage.removeItem(SS_KEY); } catch (e) {}
          return;
        }
        try { sessionStorage.setItem(SS_KEY, String(attempts + 1)); } catch (e) {}
        var doReload = function () { try { location.reload(); } catch (e) {} };
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {

          }).then(doReload, doReload);

          doReload();
        }
      }).catch(function () {});
    } catch (e) {}
  })();

  <script type="module" src="./trainer.js?v=2026-06-08-8"></script>
  <script>
  /* Открытие/закрытие сайдбара + синк имени из #userMenuBtn + выход через скрытый
     #menuLogout + навигация. Механика 1-в-1 с home_student.html.
     Бейдж уведомлений: зеркалим состояние колокольчика #myHwBellTop (header.js)
     в body.has-notif → CSS рисует кружок на «Мои ДЗ» и гамбургере. */
  (function () {
    var sidebar      = document.getElementById('htSidebar');
    var overlay      = document.getElementById('htSidebarOverlay');
    var sidebarClose = document.getElementById('htSidebarClose');
    var sidebarOpen  = document.getElementById('htSidebarOpen');
    var userBtn      = document.getElementById('htSidebarUserBtn');
    var logoutWrap   = document.getElementById('htSidebarLogoutWrap');
    var logoutBtn    = document.getElementById('htSidebarLogout');
    var userNameEl   = document.getElementById('htSidebarUserName');
    if (!sidebar) return;

    /* Открыть/закрыть сайдбар */
    function openSidebar() {
      sidebar.classList.add('open');
      document.body.classList.add('ht-sidebar-open');
      if (sidebarClose) sidebarClose.setAttribute('aria-expanded', 'true');
      if (sidebarOpen) sidebarOpen.setAttribute('aria-expanded', 'true');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      document.body.classList.remove('ht-sidebar-open');
      if (sidebarClose) sidebarClose.setAttribute('aria-expanded', 'false');
      if (sidebarOpen) sidebarOpen.setAttribute('aria-expanded', 'false');
      if (logoutWrap) logoutWrap.hidden = true;
    }

    if (sidebarClose) sidebarClose.addEventListener('click', function () {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });

    /* Гамбургер в шапке (мобилка) — открывает сайдбар */
    if (sidebarOpen) sidebarOpen.addEventListener('click', openSidebar);

    /* Тап по затемнению (мобилка, full-screen overlay) — закрывает сайдбар */
    if (overlay) overlay.addEventListener('click', closeSidebar);

    /* Esc — закрыть */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && sidebar.classList.contains('open')) closeSidebar();
    });

    /* Синхронизировать имя из #userMenuBtn (его строит header.js) */
    function syncName() {
      var label = document.querySelector('#userMenuBtn .user-menu-btn-label');
      if (label && userNameEl) {
        var name = (label.textContent || '').trim();
        if (name && name !== 'Аккаунт') userNameEl.textContent = name;
      }
    }
    var nameObs = new MutationObserver(function () {
      var label = document.querySelector('#userMenuBtn .user-menu-btn-label');
      if (!label) return;
      nameObs.disconnect();
      syncName();
      new MutationObserver(syncName).observe(label, { childList: true, characterData: true, subtree: true });
    });
    nameObs.observe(document.body, { childList: true, subtree: true });

    /* Пользователь → «Выйти» */
    if (userBtn && logoutWrap) {
      userBtn.addEventListener('click', function () {
        var isOpen = !logoutWrap.hidden;
        logoutWrap.hidden = isOpen;
        userBtn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
      });
    }
    if (logoutBtn) {
      logoutBtn.addEventListener('click', function () {
        var orig = document.getElementById('menuLogout');
        if (orig) orig.click();
        closeSidebar();
      });
    }

    /* Навигация (студенческие страницы) */
    var homeUrl = (function () {
      try {
        return /\/tasks(\/|$)/.test(location.pathname)
          ? new URL('../', location.href).toString()
          : new URL('./', location.href).toString();
      } catch (_) { return './'; }
    })();

    var navStats   = document.getElementById('htNavStats');
    var navWorks   = document.getElementById('htNavWorks');
    var navProfile = document.getElementById('htNavProfile');

    if (navStats) navStats.addEventListener('click', function () {
      location.href = homeUrl + 'tasks/stats.html';
    });
    if (navWorks) navWorks.addEventListener('click', function () {
      location.href = homeUrl + 'tasks/my_homeworks.html';
    });
    if (navProfile) navProfile.addEventListener('click', function () {
      location.href = homeUrl + 'tasks/profile.html';
    });

    /* ── Бейдж уведомлений ── зеркалим класс .hidden колокольчика #myHwBellTop
       (header.js) в body.has-notif — без новых запросов, следим за DOM. */
    function syncNotif() {
      var bell = document.getElementById('myHwBellTop');
      var has = !!(bell && !bell.classList.contains('hidden'));
      document.body.classList.toggle('has-notif', has);
    }
    syncNotif();
    var bellClassObs = new MutationObserver(syncNotif);
    var mountObs = new MutationObserver(function () {
      var bell = document.getElementById('myHwBellTop');
      if (!bell) return;
      mountObs.disconnect();
      syncNotif();
      bellClassObs.observe(bell, { attributes: true, attributeFilter: ['class'] });
    });
    mountObs.observe(document.body, { childList: true, subtree: true });
    (function () {
      var bell = document.getElementById('myHwBellTop');
      if (bell) {
        mountObs.disconnect();
        bellClassObs.observe(bell, { attributes: true, attributeFilter: ['class'] });
      }
    })();
  })();
  </script>
  <!-- WSF: единый контроллер сайдбара (Главная / активный пункт / персист рельса / role-aware) -->
  <script>
    (function () {
      /* Синхронно (до первой отрисовки) восстанавливаем сохранённое раскрытое состояние рельса —
         иначе async-модуль применит .open уже после paint → мигание ширины 56→220 при навигации. */
      try {
        if (window.matchMedia('(min-width:1025px)').matches && localStorage.getItem('ege_sidebar_open') === '1') {
          var sb = document.getElementById('htSidebar');
          if (sb) { sb.classList.add('open'); if (document.body) document.body.classList.add('ht-sidebar-open'); }
        }
      } catch (e) {}
      var B = document.querySelector('meta[name="app-build"]')?.content?.trim();
      var withV = function (p) { return B ? (p + (p.indexOf('?') >= 0 ? '&' : '?') + 'v=' + encodeURIComponent(B)) : p; };
      var rel = /\/tasks(\/|$)/.test(location.pathname) ? '../' : './';
      import(withV(rel + 'app/ui/sidebar.js')).then(function (m) { m.initSidebar && m.initSidebar(); });
    })();
  </script>
