<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; object-src 'none'; form-action 'self'; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.sentry-cdn.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://knhozdhvjhcovyjbjfji.supabase.co https://*.ingest.sentry.io https://*.sentry.io https://cdn.jsdelivr.net; frame-src https://rutube.ru;">
    <meta name="app-build" content="2026-03-04-9">
<title>Тренажер по задачам из банка ФИПИ — сессия</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="../app/diag_bootstrap.js?v=2026-03-04-9"></script>


  <script id="sentry-loader"
    src="https://js.sentry-cdn.com/931c8cc8254b6dcb3de991c6c9844397.min.js"
    crossorigin="anonymous"></script>

  <script>
  (function () {
    function boot() {
      if (!window.Sentry || typeof window.Sentry.init !== 'function') return;
      if (window.__SENTRY_INITED__) return;
      window.__SENTRY_INITED__ = true;

      var buildMeta = document.querySelector('meta[name="app-build"]');
      var release = buildMeta ? buildMeta.getAttribute('content') : 'unknown';
      var env = (location.hostname === 'ege-trainer.ru') ? 'production' : 'staging';

      var integrations = [];
      try {
        if (window.Sentry.breadcrumbsIntegration) {
          integrations.push(window.Sentry.breadcrumbsIntegration({
            console: true,
            dom: true,
            fetch: true,
            xhr: true,
            history: true,
            sentry: true
          }));
        }
        if (window.Sentry.browserApiErrorsIntegration) {
          integrations.push(window.Sentry.browserApiErrorsIntegration());
        }
        if (window.Sentry.globalHandlersIntegration) {
          integrations.push(window.Sentry.globalHandlersIntegration({
            onerror: true,
            onunhandledrejection: true
          }));
        }
      } catch (e) {}

      var opts = {
        release: release,
        environment: env,
        maxBreadcrumbs: 100,
        initialScope: { tags: { page: location.pathname } },
        beforeSend: function (event) {
          try {
            if (event && event.request) {
              if (event.request.url && event.request.url.indexOf('?') !== -1) {
                event.request.url = event.request.url.split('?')[0];
              }
              if (event.request.headers) {
                delete event.request.headers.Authorization;
                delete event.request.headers.authorization;
              }
              delete event.request.query_string;
            }
          } catch (e) {}
          return event;
        }
      };

      if (integrations.length) opts.integrations = integrations;
      window.Sentry.init(opts);
    }

    if (window.Sentry && typeof window.Sentry.onLoad === 'function') {
      window.Sentry.onLoad(boot);
    } else {
      var s = document.getElementById('sentry-loader');
      if (s) s.addEventListener('load', boot);
      if (window.Sentry) boot();
    }
  })();
  </script>


  
  <link rel="stylesheet" href="./trainer.css?v=2026-03-04-9">
  <script src="./theme.js?v=2026-03-04-9" defer></script>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-svg.js" async></script>
</head>
<body>
  <main class="container">
    <section id="runner">
      <div class="panel">
        <header id="appHeader" class="page-head">
          <h1 id="topicTitle">Подборка задач</h1>
          <div class="progress">
            <span id="idx">1</span>/<span id="total">1</span>
          </div>
          <div class="timer">
            <span id="tmin">00</span>:<span id="tsec">00</span>
          </div>
          <div class="theme-toggle" data-header-extra="1">
            <input
              type="checkbox"
              id="themeToggle"
              class="theme-toggle-input"
              aria-label="Переключить тему"
            >
            <label for="themeToggle" class="theme-toggle-label">
              <span class="theme-toggle-icon theme-toggle-icon-light">☀</span>
              <span class="theme-toggle-icon theme-toggle-icon-dark">🌙</span>
            </label>
          </div>
        
        </header>
        <script type="module">
  const BUILD = document.querySelector('meta[name="app-build"]')?.content?.trim();
  const withV = (p) => BUILD ? `${p}${p.includes('?') ? '&' : '?'}v=${encodeURIComponent(BUILD)}` : p;
  const inTasks = /\/tasks(\/|$)/.test(location.pathname);
  const rel = inTasks ? '../' : './';
  import(withV(rel + 'app/ui/header.js')).then((m) => m.initHeader({ isHome: !inTasks }));
</script>

        <div id="smartPanel" class="smart-panel hidden"></div>


        <div class="run-body">
          <article class="task-card q-card">
            <div class="task-stem">
              <div class="qwrap">
                <div class="qtext" id="stem"></div>
                <div class="qfig task-fig">
                  <img id="figure" alt="">
                </div>
              </div>
            </div>
          </article>

          <div class="answer-row">
            <input id="answer" type="text" placeholder="Ответ" autocomplete="off">
            <button id="check">Проверить</button>
          </div>

          <div class="result" id="result"></div>

          <div class="nav">
            <button id="prev">Назад</button>
            <button id="skip">Пропустить</button>
            <button id="next">Далее</button>
            <button id="finish">Завершить</button>
          </div>
        </div>


<div id="summary" class="hidden">
  <div class="panel">
    <div class="hw-summary-head">
      <h2>Отчет и статистика</h2>
    </div>
    <div id="stats" class="stats"></div>
    <div class="hw-review-controls">
      <div class="mode-toggle">
        <button id="toggleWrong" type="button" class="mode-btn">Неверные (0)</button>
      </div>
    </div>
    <div class="task-list hw-review-list" id="reviewList"></div>
    <div class="actions" style="display:none">
      <button id="restart">Новая сессия</button>
      <a id="exportCsv" href="#" download="tasks_session.csv">Экспорт CSV</a>
    </div>
  </div>
</div>

      </div>
    </section>
  </main>

  <script type="module" src="./trainer.js?v=2026-03-04-9"></script>
</body>
</html>
