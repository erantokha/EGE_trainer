<body class="auth-page">
  <div class="auth-wrap">
    <a class="brand" href="#" aria-label="EGE-trainer">EGE<span>-trainer</span></a>

    <main class="auth-card" id="auth">
      <div class="auth-head">
        <h1 class="auth-title">Почти готово</h1>
        <p class="auth-sub">Вы вошли через Google — заполните данные профиля.</p>
      </div>

      <form id="completeForm" novalidate>
        <div class="form-row">
          <span class="field-label">Кто вы?</span>
          <div class="role-row" role="radiogroup" aria-label="Роль">
            <label class="role-chip">
              <input type="radio" name="role" value="student" checked>
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="4.5" r="2.5" fill="currentColor" stroke="none"/><path d="M2 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke-linecap="round"/></svg>
              Ученик
            </label>
            <label class="role-chip">
              <input type="radio" name="role" value="teacher">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="4.5" r="2.5" fill="currentColor" stroke="none"/><path d="M2 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke-linecap="round"/><rect x="5" y="7.5" width="4" height="3" rx="0.5" fill="currentColor" stroke="none" opacity="0.55"/></svg>
              Учитель
            </label>
          </div>
        </div>

        <div class="form-row">
          <label class="field-label" for="lastName">Фамилия</label>
          <input id="lastName" type="text" autocomplete="family-name" placeholder="Иванова" required>
        </div>
        <div class="form-row">
          <label class="field-label" for="firstName">Имя</label>
          <input id="firstName" type="text" autocomplete="given-name" placeholder="Анна" required>
        </div>

        <div id="studentFields">
          <div class="form-row">
            <label class="field-label" for="studentGrade">Класс</label>
            <select id="studentGrade" required>
              <option value="" selected disabled>Выберите класс</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
            </select>
          </div>
        </div>

        <div id="teacherFields" class="hidden">
          <div class="form-row">
            <label class="field-label" for="teacherType">Вы</label>
            <select id="teacherType">
              <option value="" selected disabled>Выберите вариант</option>
              <option value="school">Школьный учитель</option>
              <option value="tutor">Репетитор</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <label class="field-label" for="email">Email</label>
          <input id="email" type="email" autocomplete="email" disabled>
        </div>

        <div class="form-actions">
          <button id="saveBtn" type="submit" class="btn-primary">
            <span class="spinner" aria-hidden="true"></span>
            <span class="btn-label">Сохранить</span>
          </button>
        </div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </form>
    </main>

    <p class="auth-foot">Продолжая, вы соглашаетесь с <a href="#">условиями использования</a>.</p>
  </div>
