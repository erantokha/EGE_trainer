<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">

  <rect x="0" y="0" width="220" height="220" fill="white" />

  <defs>
    <!-- стрелка для осей -->
    <marker id="axis-arrow"
            viewBox="0 0 15 8"
            refX="13" refY="4"
            markerWidth="12" markerHeight="6.4"
            orient="auto"
            markerUnits="userSpaceOnUse">
      <path d="M 3 0 L 15 4 L 3 8 L 7 4 Z"
            fill="black" />
    </marker>
  </defs>

  <!-- тонкая клетчатая сетка 10×10, без окаймления по периметру -->
  <g stroke="#d1d5db" stroke-width="1.75" shape-rendering="crispEdges">
    <!-- вертикальные линии: только внутренние -->
    <line x1="30"  y1="10" x2="30"  y2="210" />
    <line x1="50"  y1="10" x2="50"  y2="210" />
    <line x1="70"  y1="10" x2="70"  y2="210" />
    <line x1="90"  y1="10" x2="90"  y2="210" />
    <line x1="110" y1="10" x2="110" y2="210" />
    <line x1="130" y1="10" x2="130" y2="210" />
    <line x1="150" y1="10" x2="150" y2="210" />
    <line x1="170" y1="10" x2="170"  y2="210" />
    <line x1="190" y1="10" x2="190" y2="210" />

    <!-- горизонтальные линии: только внутренние -->
    <line x1="10" y1="30"  x2="210" y2="30"  />
    <line x1="10" y1="50"  x2="210" y2="50"  />
    <line x1="10" y1="70"  x2="210" y2="70"  />
    <line x1="10" y1="90"  x2="210" y2="90"  />
    <line x1="10" y1="110" x2="210" y2="110" />
    <line x1="10" y1="130" x2="210" y2="130" />
    <line x1="10" y1="150" x2="210" y2="150" />
    <line x1="10" y1="170" x2="210" y2="170" />
    <line x1="10" y1="190" x2="210" y2="190" />
  </g>

  <!-- оси x и y -->
  <g stroke="#111827" stroke-width="1.25">
    <line x1="10" y1="150" x2="210" y2="150"
          marker-end="url(#axis-arrow)" />
    <line x1="70" y1="210" x2="70" y2="10"
          marker-end="url(#axis-arrow)" />
  </g>

  <!-- подписи осей и делений -->
  <g font-family="sans-serif" font-size="11" fill="#111827">
    <text x="66" y="163" text-anchor="end"
          font-size="13" font-style="italic"
          font-family="Georgia, 'Times New Roman', serif">O</text>

    <rect x="87" y="153" width="7" height="12" fill="white" />
    <text x="90" y="164" text-anchor="middle" font-size="13"
          font-family="'Times New Roman', serif"
          font-weight="300">1</text>

    <text x="63" y="134" text-anchor="end" font-size="13"
          font-family="'Times New Roman', serif"
          font-weight="300">1</text>

    <text x="206" y="163" text-anchor="start"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic" font-size="13">x</text>

    <text x="67" y="13" text-anchor="end"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic" font-size="13">y</text>
  </g>

  <!-- парабола y = x^2 - 3x + 2, цвет #2d70b3 -->
  <g stroke="#2d70b3" stroke-width="1.25" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M 46.148 10.000 L 47.359 16.444 L 48.569 22.741 L 49.779 28.892 L 50.989 34.896 L 52.199 40.754 L 53.409 46.465 L 54.619 52.030 L 55.830 57.449 L 57.040 62.721 L 58.250 67.846 L 59.460 72.825 L 60.670 77.658 L 61.880 82.344 L 63.090 86.884 L 64.301 91.278 L 65.511 95.525 L 66.721 99.625 L 67.931 103.579 L 69.141 107.387 L 70.351 111.048 L 71.561 114.563 L 72.772 117.931 L 73.982 121.153 L 75.192 124.228 L 76.402 127.157 L 77.612 129.939 L 78.822 132.575 L 80.033 135.065 L 81.243 137.408 L 82.453 139.605 L 83.663 141.655 L 84.873 143.559 L 86.083 145.316 L 87.293 146.927 L 88.504 148.392 L 89.714 149.710 L 90.924 150.881 L 92.134 151.906 L 93.344 152.785 L 94.554 153.517 L 95.764 154.103 L 96.975 154.542 L 98.185 154.835 L 99.395 154.982 L 100.605 154.982 L 101.815 154.835 L 103.025 154.542 L 104.236 154.103 L 105.446 153.517 L 106.656 152.785 L 107.866 151.906 L 109.076 150.881 L 110.286 149.710 L 111.496 148.392 L 112.707 146.927 L 113.917 145.316 L 115.127 143.559 L 116.337 141.655 L 117.547 139.605 L 118.757 137.408 L 119.967 135.065 L 121.178 132.575 L 122.388 129.939 L 123.598 127.157 L 124.808 124.228 L 126.018 121.153 L 127.228 117.931 L 128.439 114.563 L 129.649 111.048 L 130.859 107.387 L 132.069 103.579 L 133.279 99.625 L 134.489 95.525 L 135.699 91.278 L 136.910 86.884 L 138.120 82.344 L 139.330 77.658 L 140.540 72.825 L 141.750 67.846 L 142.960 62.721 L 144.170 57.449 L 145.381 52.030 L 146.591 46.465 L 147.801 40.754 L 149.011 34.896 L 150.221 28.892 L 151.431 22.741 L 152.641 16.444 L 153.852 10.000" />
  </g>

  <!-- точки на параболе (радиус 2.2) -->
  <circle cx="70.000" cy="110.000" r="2.2" fill="#2d70b3" />
  <circle cx="90.000" cy="150.000" r="2.2" fill="#2d70b3" />
  <circle cx="110.000" cy="150.000" r="2.2" fill="#2d70b3" />

  <!-- подпись f(x) -->
  <text x="150" y="90"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="13"
        fill="#2d70b3">
    f(x)
  </text>

</svg>
