<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Контракт оформления решений №13</title>
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(', '\\)'], ['$', '$']], displayMath: [['\\[', '\\]']] },
  svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-svg.js" async></script>
<style>
  :root {
    --bg: #f8fafc;
    --surface: #fff;
    --ink: #111827;
    --muted: #64748b;
    --line: #d8dee8;
    --soft: #eef2f7;
    --error-bg: #fee2e2;
    --error-fg: #991b1b;
    --warning-bg: #fef3c7;
    --warning-fg: #92400e;
    --note-bg: #dbeafe;
    --note-fg: #1e40af;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 24px 52px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 30px;
    line-height: 1.18;
  }
  h2 {
    margin: 28px 0 12px;
    font-size: 21px;
    line-height: 1.25;
  }
  h3 {
    margin: 0 0 8px;
    font-size: 17px;
    line-height: 1.3;
  }
  p { margin: 0 0 10px; }
  code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: .92em;
  }
  .note,
  .status,
  .workflow,
  .rule,
  .example {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .note {
    padding: 12px 14px;
    color: #475569;
  }
  .status {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0;
    margin: 18px 0;
    overflow: hidden;
  }
  .status-item {
    padding: 12px 14px;
    border-right: 1px solid var(--line);
  }
  .status-item:last-child { border-right: 0; }
  .status-label {
    display: block;
    margin-bottom: 3px;
    color: var(--muted);
    font-size: 13px;
  }
  .workflow-list,
  .rules-list {
    display: grid;
    gap: 12px;
  }
  .workflow {
    padding: 14px;
  }
  .rule {
    display: grid;
    grid-template-columns: minmax(180px, 260px) minmax(0, 1fr);
    gap: 0;
    overflow: hidden;
  }
  .rule-head {
    padding: 13px 14px;
    background: var(--soft);
    border-right: 1px solid var(--line);
  }
  .rule-body {
    padding: 13px 14px;
  }
  .rule-id {
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    width: max-content;
    margin-top: 8px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 650;
  }
  .badge-error { background: var(--error-bg); color: var(--error-fg); }
  .badge-warning { background: var(--warning-bg); color: var(--warning-fg); }
  .badge-note { background: var(--note-bg); color: var(--note-fg); }
  .example-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 10px;
    margin-top: 10px;
  }
  .example {
    padding: 10px 12px;
    font-family: "Times New Roman", Times, serif;
    font-size: 20px;
    color: #000;
  }
  .example-label {
    display: block;
    margin-bottom: 6px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    color: var(--muted);
  }
  .formula {
    margin-top: 8px;
    font-family: "Times New Roman", Times, serif;
    font-size: 20px;
    color: #000;
  }
  .empty {
    padding: 18px;
    color: var(--muted);
  }
  @media (max-width: 720px) {
    main { padding: 22px 14px 42px; }
    .rule { grid-template-columns: 1fr; }
    .rule-head { border-right: 0; border-bottom: 1px solid var(--line); }
    .status-item { border-right: 0; border-bottom: 1px solid var(--line); }
    .status-item:last-child { border-bottom: 0; }
  }
</style>
</head>
<body>
<main>
  <h1 id="title">Контракт оформления решений №13</h1>
  <p id="lead" class="note">Загрузка контракта...</p>
  <div id="status" class="status" hidden></div>
  <h2>Процесс</h2>
  <div id="workflow" class="workflow-list"></div>
  <div id="sections"></div>
</main>

<script type="module">
const CONTRACT_URL = './solution_contract.json';

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function levelLabel(level) {
  return {
    error: 'error',
    warning: 'warning',
    note: 'note'
  }[level] || level || 'rule';
}

function texBlock(tex) {
  if (!tex) return '';
  return `<div class="formula">\\(${esc(tex)}\\)</div>`;
}

function renderExamples(rule) {
  const examples = Array.isArray(rule.examples) ? rule.examples : [];
  const blocks = [];
  if (rule.expected_tex) {
    blocks.push(`<div class="example"><span class="example-label">Ожидаемая запись</span>\\(${esc(rule.expected_tex)}\\)</div>`);
  }
  for (const example of examples) {
    if (example.good_tex) blocks.push(`<div class="example"><span class="example-label">Так пишем</span>\\(${esc(example.good_tex)}\\)</div>`);
    if (example.bad_tex) blocks.push(`<div class="example"><span class="example-label">Так не пишем</span>\\(${esc(example.bad_tex)}\\)</div>`);
  }
  return blocks.length ? `<div class="example-grid">${blocks.join('')}</div>` : '';
}

function renderRule(rule) {
  const level = levelLabel(rule.level);
  return `<article class="rule">
    <div class="rule-head">
      <h3>${esc(rule.title)}</h3>
      <div class="rule-id"><code>${esc(rule.id)}</code></div>
      <span class="badge badge-${esc(level)}">${esc(level)}</span>
    </div>
    <div class="rule-body">
      <p>${esc(rule.text)}</p>
      ${texBlock(rule.expected_tex)}
      ${renderExamples(rule)}
    </div>
  </article>`;
}

function renderSection(section) {
  const rules = Array.isArray(section.rules) ? section.rules : [];
  return `<section>
    <h2>${esc(section.title)}</h2>
    <div class="rules-list">${rules.map(renderRule).join('') || '<div class="empty">Правил пока нет.</div>'}</div>
  </section>`;
}

function renderWorkflow(items) {
  return (Array.isArray(items) ? items : []).map((item) => `
    <article class="workflow">
      <h3>${esc(item.title)}</h3>
      <p>${esc(item.text)}</p>
      <div class="rule-id"><code>${esc(item.id)}</code></div>
    </article>
  `).join('') || '<div class="empty">Процесс не описан.</div>';
}

function renderStatus(contract) {
  const ruleCount = (contract.sections || []).reduce((sum, section) => sum + (section.rules || []).length, 0);
  const checkCount = contract.audit?.checks?.length || 0;
  const manifestCount = contract.sources?.manifests?.length || 0;
  return `
    <div class="status-item"><span class="status-label">Версия</span><code>${esc(contract.version)}</code></div>
    <div class="status-item"><span class="status-label">Статус</span>${esc(contract.status)}</div>
    <div class="status-item"><span class="status-label">Правил</span>${ruleCount}</div>
    <div class="status-item"><span class="status-label">Проверок</span>${checkCount}</div>
    <div class="status-item"><span class="status-label">Манифестов</span>${manifestCount}</div>
  `;
}

async function main() {
  const contract = await (await fetch(CONTRACT_URL, { cache: 'no-store' })).json();
  document.title = contract.title || document.title;
  document.querySelector('#title').textContent = contract.title || 'Контракт оформления решений №13';
  document.querySelector('#lead').textContent = contract.owner_note || '';
  const status = document.querySelector('#status');
  status.innerHTML = renderStatus(contract);
  status.hidden = false;
  document.querySelector('#workflow').innerHTML = renderWorkflow(contract.workflow);
  document.querySelector('#sections').innerHTML = (contract.sections || []).map(renderSection).join('');
  document.body.dataset.ready = '1';
  if (window.MathJax?.typesetPromise) await window.MathJax.typesetPromise();
}

main().catch((err) => {
  document.querySelector('#lead').textContent = `Не удалось загрузить контракт: ${err.message}`;
  console.error(err);
});
</script>
</body>
</html>
