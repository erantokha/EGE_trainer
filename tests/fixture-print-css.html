<!DOCTYPE html>
<!--
  Фикстура для тестирования CSS-правил печати.
  Проверяет: break-after/break-inside, видимость элементов в @media print,
  режим body.print-with-answers, #addedBox override .hidden.
  Запускается через Puppeteer в print-features.js.
-->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="app-build" content="2026-04-07-11">
  <title>Fixture: Print CSS</title>
  <!-- Реальный trainer.css — тестируем настоящие правила -->
  <link rel="stylesheet" href="../tasks/trainer.css?v=2026-04-07-11">
</head>
<body>

  <!-- ws-item: break-inside, ws-stem: break-after, ws-ans, print-ans-line -->
  <div class="uniq-list">
    <div class="ws-item" data-topic-id="2.1">
      <div class="ws-num">2.1.3-1</div>
      <div class="ws-stem">Условие задачи векторы</div>
      <div class="ws-fig" data-fig-type="derivatives" data-fig-orientation="landscape">
        <img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" alt="">
      </div>
      <details class="ws-ans" open>
        <summary><span class="ws-ans-label">Ответ</span></summary>
        <div class="ws-ans-text">42</div>
      </details>
      <div class="print-ans-line">Ответ: ________________________</div>
    </div>
  </div>

  <!-- task-card: task-stem break-after, task-ans -->
  <div class="task-list">
    <div class="task-card">
      <div class="task-num">1</div>
      <div class="task-stem">Условие задачи список</div>
      <details class="task-ans" open>
        <summary>Ответ</summary>
        <div>15</div>
      </details>
      <div class="print-ans-line">Ответ: ________________________</div>
    </div>
  </div>

  <!-- print-custom-title: скрыт на экране, виден в печати -->
  <div class="print-custom-title">Контрольная работа №1</div>

  <!-- hw-create-ans: скрыт на экране, виден при print-with-answers в печати -->
  <div class="hw-create-ans">15</div>

  <!-- node.topic > .row: break-after: avoid в печати -->
  <div class="accordion">
    <div class="node topic expanded">
      <div class="row">
        <button class="section-title" type="button">2.1. Векторы</button>
      </div>
      <div class="children" style="display:block">
        <div class="uniq-list">
          <div class="ws-item">
            <div class="ws-num">2.1.3-1</div>
            <div class="ws-stem">Текст</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- #addedBox с классом .hidden — в печати должен быть виден -->
  <div id="addedBox" class="hidden">
    <div id="fixedCards">
      <div class="tp-item fixed-prev-card">
        <div class="fixed-mini-num">1</div>
        <div class="tp-item-left">
          <div class="tp-item-meta fixed-prev-meta">2.1</div>
          <div class="tp-item-stem fixed-prev-body">Условие</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
