<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; object-src 'none'; form-action 'self'; img-src 'self' data: https:; font-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.sentry-cdn.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://knhozdhvjhcovyjbjfji.supabase.co https://*.ingest.sentry.io https://*.sentry.io https://cdn.jsdelivr.net; frame-src https://rutube.ru;">
  <meta name="app-build" content="2026-03-05-1">
  <title>Тренажер по задачам из банка ФИПИ</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!--
    Главная ученика (/home_student.html).
    Сейчас по дизайну совпадает с / (index.html), но файл отдельный,
    чтобы в дальнейшем можно было развести дизайн.
  -->

  <script id="sentry-loader"
    src="https://js.sentry-cdn.com/931c8cc8254b6dcb3de991c6c9844397.min.js"
    crossorigin="anonymous"></script>
  <script>
  (function () {
    if (window.__SENTRY_INITED__) return;
    window.__SENTRY_INITED__ = true;

    function getRelease() {
      var m = document.querySelector('meta[name="app-build"]');
      return (m && m.getAttribute('content')) ? m.getAttribute('content') : 'unknown';
    }

    function getEnv() {
      return (location.hostname === 'ege-trainer.ru') ? 'production' : 'staging';
    }

    function sanitizeEvent(event) {
      try {
        if (event && event.request && event.request.url) {
          event.request.url = event.request.url.split('#')[0].split('?')[0];
        }
        if (event && event.request && event.request.headers) {
          delete event.request.headers.Authorization;
          delete event.request.headers.authorization;
          delete event.request.headers.Cookie;
          delete event.request.headers.cookie;
        }
      } catch (e) {}
      return event;
    }

    function doInit() {
      if (!window.Sentry || !window.Sentry.init) return;

      var opts = {
        release: getRelease(),
        environment: getEnv(),
        initialScope: {
          tags: { page: location.pathname }
        },
        beforeSend: sanitizeEvent
      };

      try {
        if (window.Sentry.onLoad) {
          window.Sentry.onLoad(function () {
            window.Sentry.init(opts);
          });
          return;
        }
      } catch (e) {}

      window.Sentry.init(opts);
    }

    doInit();
  })();
  </script>

  <link rel="stylesheet" href="./tasks/trainer.css?v=2026-03-05-1">
  <link rel="stylesheet" href="./tasks/home_student.mobile.css?v=2026-03-05-1">
</head>
<body data-home-variant="student">
  <main class="container">
    <section id="picker">
      <div class="panel">
        <header id="appHeader" class="page-head">
          <h1 style="margin:0">Тренажер по задачам из банка ФИПИ</h1>
        </header>
        <script type="module">
          const BUILD = document.querySelector('meta[name="app-build"]')?.content?.trim();
          const withV = (p) => BUILD ? `${p}${p.includes('?') ? '&' : '?'}v=${encodeURIComponent(BUILD)}` : p;
          const inTasks = /\/tasks(\/|$)/.test(location.pathname);
          const rel = inTasks ? '../' : './';
          import(withV(rel + 'app/ui/header.js')).then((m) => m.initHeader({ isHome: !inTasks }));
        </script>
      </div>
      <!-- Градусник готовности (мобилка): между шапкой и режимами -->
      <div id="scoreThermoSlot" class="score-thermo-slot" aria-label="Готовность по первой части">
        <div id="scoreThermo" class="score-thermo" data-color="gray">
          <div class="score-thermo__track">
            <div id="scoreThermoFill" class="score-thermo__fill"></div>
            <div class="score-thermo__content">
              <div class="score-thermo__label">Готовность по первой части</div>
              <div class="score-thermo__values">
                <span id="scoreThermoSecondary" class="score-thermo__secondary">—</span>
                <span id="scoreThermoPrimary" class="score-thermo__primary">—</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Ряд 1: режим + перемешать (слева), старт (справа) -->
      <div class="controls">
        <div class="controls-left">
          <div class="mode-toggle" id="pickSwitch" role="tablist" aria-label="Режим подбора">
            <button type="button" class="mode-btn active" id="pickManual" data-pick="manual" aria-selected="true">
              Ручное добавление задач
            </button>
            <button type="button" class="mode-btn" id="pickSmart" data-pick="smart" aria-selected="false">
              Умная тренировка
            </button>
          </div>

          <button id="start" class="start-sum-btn" disabled>Начать · Итого: <span id="sum">0</span></button>
        </div>

        <div class="theme-toggle">
          <input type="checkbox" id="themeToggle" class="theme-toggle-input" aria-label="Переключить тему">
          <label for="themeToggle" class="theme-toggle-label">
            <span class="theme-toggle-icon theme-toggle-icon-light">☀</span>
            <span class="theme-toggle-icon theme-toggle-icon-dark">🌙</span>
          </label>
        </div>
      </div>

      <!-- Умная тренировка: настройки и сбор плана -->
      <div class="smart-controls" id="smartControls" hidden>
        <div class="smart-left">
          <div class="smart-n" role="group" aria-label="Количество задач">
            <span class="smart-label">Количество:</span>
            <button type="button" class="btn-compact smart-n-btn active" data-n="10">10</button>
            <button type="button" class="btn-compact smart-n-btn" data-n="15">15</button>
            <button type="button" class="btn-compact smart-n-btn" data-n="20">20</button>
          </div>
          <button id="smartBuild" type="button" class="btn-compact">Собрать план</button>
        </div>
        <div id="smartHint" class="smart-hint"></div>
      </div>

      <!-- Ряд 2: массовые кнопки (слева) + итого (справа) -->
      <div class="sub-controls">
        <div class="bulk-controls" id="bulkControls">
          <button id="bulkPickAll" type="button">Выбрать все</button>
          <button id="bulkResetAll" type="button">Сбросить все</button>
          <label class="shuffle shuffle-inline">
            <input type="checkbox" id="shuffleToggle">
            Перемешать задачи
          </label>
        </div>
      </div>

      <!-- Ряд 3: аккордеон + прогноз баллов -->
      <div class="picker-grid">
        <div class="picker-left">
          <div id="accordion" class="accordion"></div>
        </div>
        <aside class="picker-right" aria-label="Прогноз баллов">
          <div class="score-forecast" id="scoreForecast">
<div class="sf-row">
              <div class="sf-label">Первичные (до округления)</div>
              <div class="sf-value" id="sfPrimaryExact">—</div>
            </div>
            <div class="sf-row">
              <div class="sf-label">Вторичные</div>
              <div class="sf-value" id="sfSecondary">—</div>
            </div>
            <div class="sf-note" id="sfNote" hidden></div>
          </div>

          <div class="home-proto-panel" id="homeProtoPanel" hidden>
            <div class="home-proto-head">
              <div class="home-proto-title" id="homeProtoTitle">—</div>
              <div class="home-proto-note" id="homeProtoNote">Кликните по подтеме слева, чтобы добавить конкретные прототипы.</div>
            </div>
            <div class="tp-list" id="homeProtoList"></div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <!-- Выбор уникальных прототипов (главная ученика): карточки 1-в-1 как на странице создания ДЗ -->
  <div id="protoPickerModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Выбор прототипов">
      <div class="modal-head">
        <div class="modal-title" id="protoPickerTitle">Прототипы</div>
        <div class="tp-main-actions">
          <div id="protoPickerSelectedCount" class="muted">Выбрано: 0</div>
          <button id="protoPickerClose" class="btn small" type="button" aria-label="Закрыть">×</button>
        </div>
      </div>

      <div class="proto-picker-main">
        <div id="protoPickerList" class="tp-list"></div>
        <div id="protoPickerHint" class="muted tp-hint"></div>
      </div>
    </div>
  </div>

  <script src="./tasks/theme.js?v=2026-03-05-1" defer></script>
  <script type="module" src="./tasks/home_guard.js?v=2026-03-05-1"></script>
  <script type="module" src="./tasks/picker.js?v=2026-03-05-1"></script>
</body>
</html>
