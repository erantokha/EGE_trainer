<script>
(function () {
  if (window.__SENTRY_INITED__) return;
  window.__SENTRY_INITED__ = true;

  function getRelease() {
    var m = document.querySelector('meta[name="app-build"]');
    return (m && m.getAttribute('content')) ? m.getAttribute('content') : 'unknown';
  }

  function getEnv() {
    return (location.hostname === 'ege-trainer.ru') ? 'production' : 'staging';
  }

  function sanitizeEvent(event) {
    try {
      if (event && event.request && event.request.url) {
        event.request.url = event.request.url.split('#')[0].split('?')[0];
      }
      if (event && event.request && event.request.headers) {
        delete event.request.headers.Authorization;
        delete event.request.headers.authorization;
        delete event.request.headers.Cookie;
        delete event.request.headers.cookie;
      }
    } catch (e) {}
    return event;
  }

  function doInit() {
    if (!window.Sentry || !window.Sentry.init) return;

    var opts = {
      release: getRelease(),
      environment: getEnv(),
      initialScope: {
        tags: { page: location.pathname }
      },
      beforeSend: sanitizeEvent
    };

    try {
      if (window.Sentry.onLoad) {
        window.Sentry.onLoad(function () {
          window.Sentry.init(opts);
        });
        return;
      }
    } catch (e) {}

    window.Sentry.init(opts);
  }

  doInit();
})();
</script>

              aria-controls="studentComboList"
              aria-autocomplete="list"

            >

<span id="teacherStudentStatus" class="muted ht-student-status"></span>

      <script>
      (function () {
        var input      = document.getElementById('studentComboInput');
        var list       = document.getElementById('studentComboList');
        var sel        = document.getElementById('teacherStudentSelect');
        var clearBtn   = document.getElementById('studentComboClear');
        var profileBtn = document.getElementById('studentProfileBtn');
        if (!input || !list || !sel || !clearBtn) return;

        var _value = '';  // зафиксированный value
        var _label = '';  // зафиксированный label
        var _open  = false;

        function syncProfileBtn(value) {
          if (!profileBtn) return;
          if (value) {
            profileBtn.hidden = false;
            profileBtn.onclick = function () {
              var url = new URL('./tasks/student.html', location.href);
              url.searchParams.set('student_id', value);
              location.href = url.toString();
            };
          } else {
            profileBtn.hidden = true;
            profileBtn.onclick = null;
          }
        }

        /* ── утилиты ── */
        function esc(s) {
          return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // 0 = первое слово совпадает, 1 = другое слово, -1 = нет совпадения
        function scoreItem(text, q) {
          if (!q) return 0;
          var words = text.toLowerCase().split(/\s+/);
          for (var i = 0; i < words.length; i++) {
            if (words[i].indexOf(q) === 0) return i === 0 ? 0 : 1;
          }
          return -1;
        }

        function hlText(text, q) {
          if (!q) return esc(text);
          var parts = text.split(/(\s+)/);
          var out = '';
          for (var i = 0; i < parts.length; i++) {
            var p = parts[i];
            if (/\s+/.test(p)) { out += p; continue; }
            if (p.toLowerCase().indexOf(q) === 0) {
              out += '<mark>' + esc(p.slice(0, q.length)) + '</mark>' + esc(p.slice(q.length));
            } else {
              out += esc(p);
            }
          }
          return out;
        }

        /* ── кнопка × ── */
        function showClear(on) { clearBtn.hidden = !on; }

        /* ── построение списка ── */
        function buildItems(q) {
          list.innerHTML = '';
          var items = [];
          for (var i = 0; i < sel.options.length; i++) {
            var opt = sel.options[i];
            if (!opt.value) continue;
            var s = scoreItem(opt.text, q);
            if (s >= 0) items.push({ value: opt.value, text: opt.text, s: s });
          }
          items.sort(function (a, b) {
            return a.s !== b.s ? a.s - b.s : a.text.localeCompare(b.text, 'ru');
          });

          if (!items.length) {
            var empty = document.createElement('div');
            empty.className = 'ht-combo-item ht-combo-item--empty';
            empty.textContent = q ? 'Нет совпадений' : 'Ученики не загружены';
            list.appendChild(empty);
            return;
          }
          for (var j = 0; j < items.length; j++) {
            (function (it) {
              var div = document.createElement('div');
              div.className = 'ht-combo-item';
              div.setAttribute('role', 'option');
              div.innerHTML = hlText(it.text, q);
              div.addEventListener('mousedown', function (e) {
                e.preventDefault();
                commit(it.value, it.text);
              });
              list.appendChild(div);
            })(items[j]);
          }
        }

        /* ── открыть / закрыть ── */
        function open() {
          buildItems(getQ());
          list.hidden = false;
          input.setAttribute('aria-expanded', 'true');
          _open = true;
        }

        function close() {
          list.hidden = true;
          input.setAttribute('aria-expanded', 'false');
          _open = false;
          clearActive();
        }

        function getQ() { return input.value.trim().toLowerCase(); }

        /* ── выбор / сброс / отмена ── */
        function commit(value, label) {
          _value = value;
          _label = label;
          input.value = label;
          showClear(true);
          syncProfileBtn(value);
          sel.value = value;
          sel.dispatchEvent(new Event('change', { bubbles: true }));
          close();
          input.blur(); // убираем фокус после выбора — курсор не мигает
        }

        function deselect() {
          _value = '';
          _label = '';
          input.value = '';
          showClear(false);
          syncProfileBtn('');
          sel.value = '';
          sel.dispatchEvent(new Event('change', { bubbles: true }));
          close();
          input.focus();
        }

        function abort() {
          input.value = _label;
          showClear(!!_label);
          close();
        }

        /* ── клавиатурная навигация ── */
        function liveItems() {
          return list.querySelectorAll('.ht-combo-item:not(.ht-combo-item--empty)');
        }

        function clearActive() {
          var a = list.querySelector('.ht-combo-item--active');
          if (a) a.classList.remove('ht-combo-item--active');
        }

        function navigate(dir) {
          var items = liveItems();
          if (!items.length) return;
          var cur = list.querySelector('.ht-combo-item--active');
          var idx = -1;
          for (var i = 0; i < items.length; i++) {
            if (items[i] === cur) { idx = i; break; }
          }
          if (cur) cur.classList.remove('ht-combo-item--active');
          idx = (idx + dir + items.length) % items.length;
          items[idx].classList.add('ht-combo-item--active');
          items[idx].scrollIntoView({ block: 'nearest' });
        }

        /* ── события ── */
        input.addEventListener('focus', function () {
          if (input.value && input.value === _label) input.value = '';
          showClear(false);  // скрываем × пока идёт поиск
          open();
        });

        input.addEventListener('input', function () {
          if (_open) buildItems(getQ());
        });

        input.addEventListener('blur', function () {
          // Если студент не подтверждён — сразу сбрасываем градиент,
          // не дожидаясь picker.js (который может быть ещё не завершил async)
          if (!_value) {
            var comboEl = document.getElementById('studentCombo');
            var scoreEl = document.getElementById('studentComboScore');
            input.style.removeProperty('--combo-fill-pct');
            input.style.removeProperty('--combo-fill-color');
            if (comboEl) comboEl.classList.remove('has-score');
            if (scoreEl) scoreEl.classList.remove('is-visible');
          }
          setTimeout(abort, 120);
        });

        input.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') {
            abort(); input.blur();
          } else if (e.key === 'Enter') {
            e.preventDefault();
            var active = list.querySelector('.ht-combo-item--active');
            if (active) active.dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (!_open) open(); else navigate(1);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (!_open) open(); else navigate(-1);
          }
        });

        // mousedown (не click) — чтобы сработало до blur на input
        clearBtn.addEventListener('mousedown', function (e) {
          e.preventDefault();
          deselect();
        });

        /* ── синхронизация с picker.js ── */
        new MutationObserver(function () {
          input.disabled = sel.disabled;
          if (!sel.disabled && !_open) {
            var opt = sel.options[sel.selectedIndex];
            if (opt && opt.value) {
              _value = opt.value;
              _label = opt.text;
              input.value = opt.text;
              showClear(true);
              syncProfileBtn(_value);
            } else {
              _value = '';
              _label = '';
              showClear(false);
              syncProfileBtn('');
            }
          }
        }).observe(sel, { attributes: true, attributeFilter: ['disabled'] });

      })();
      </script>

        <!-- Строка 1: режим, перемешать, фильтры -->

            Перемешать задачи

          <span id="teacherFilterWrap" class="ht-filter-wrap" data-tip="Выберите ученика">
            <select
              id="teacherFilterDropdown"
              class="ht-filter-dropdown"
              disabled
              aria-label="Фильтр teacher picking"
            >
              <option value="">Без фильтра</option>
              <option value="unseen_low">Не решал / мало решал</option>
              <option value="stale">Давно решал</option>
              <option value="unstable">Нестабильно решает</option>
            </select>
          </span>

          <!-- Радиокнопки скрыты визуально; picker.js обращается к ним по id/name -->
          <div id="teacherFilters" aria-hidden="true" style="display:none">
            <input type="radio" name="teacherFilterMode" id="teacherFilterNone" value="" checked disabled>
            <input type="radio" name="teacherFilterMode" id="teacherFilterUnseenLow" value="unseen_low" disabled>
            <input type="radio" name="teacherFilterMode" id="teacherFilterStale" value="stale" disabled>
            <input type="radio" name="teacherFilterMode" id="teacherFilterUnstable" value="unstable" disabled>
          </div>
        </div>

        <!-- Строка 2: bulk-кнопки -->
        <div class="ht-toolbar-row ht-toolbar-row--bulk">
          <div class="bulk-controls" id="bulkControls">
            <button id="bulkPickAll" type="button">Выбрать все</button>
            <button id="bulkResetAll" type="button">Сбросить все</button>
          </div>
        </div>

      </div>
      <script>
      (function () {
        var FILTER_KEY = 'teacher_pick_filter_id_v2';
        var VALID     = ['unseen_low', 'stale', 'unstable'];
        var dropdown  = document.getElementById('teacherFilterDropdown');
        var radioNone = document.getElementById('teacherFilterNone');
        var wrap      = document.getElementById('teacherFilterWrap');
        if (!dropdown || !radioNone) return;

        // Инициализация: восстановить выбранный фильтр из sessionStorage
        // (тот же ключ, что читает picker.js в loadTeacherPickFilterId)
        try {
          var stored = sessionStorage.getItem(FILTER_KEY);
          if (stored && VALID.indexOf(stored) !== -1) dropdown.value = stored;
        } catch (_) {}

        // Дропдаун → радио: picker.js слушает 'change' на радио и читает event.target.value
        dropdown.addEventListener('change', function () {
          var radio = document.querySelector(
            '#teacherFilters input[name="teacherFilterMode"][value="' + dropdown.value + '"]'
          );
          if (radio && !radio.disabled) {
            radio.checked = true;
            radio.dispatchEvent(new Event('change', { bubbles: true }));
          }
        });

        // disabled-синхронизация: picker.js выставляет radio.disabled → зеркалим в dropdown
        // 'disabled' — IDL-рефлексируемый атрибут, MutationObserver его ловит
        new MutationObserver(function () {
          var dis = radioNone.disabled;
          dropdown.disabled = dis;
          if (wrap) {
            if (dis) wrap.setAttribute('data-tip', 'Выберите ученика');
            else wrap.removeAttribute('data-tip');
          }
        }).observe(radioNone, { attributes: true, attributeFilter: ['disabled'] });
      })();
      </script>

<script>
/* Выравнивает верх .ht-action-panel по первой .node.section аккордеона (десктоп).
   Аккордеон заполняется асинхронно picker.js, поэтому ждём через MutationObserver. */
(function () {
  var panel     = document.querySelector('.ht-action-panel');
  var main      = document.querySelector('.ht-main');
  var accordion = document.getElementById('accordion');
  if (!panel || !main || !accordion) return;

  function align() {
    if (window.innerWidth <= 1024) { panel.style.marginTop = ''; return; }
    var first = accordion.querySelector('.node.section');
    if (!first) return;
    var off = Math.max(0,
      first.getBoundingClientRect().top - main.getBoundingClientRect().top
    );
    panel.style.marginTop = off + 'px';
  }

  var obs = new MutationObserver(function (_, o) {
    if (!accordion.querySelector('.node.section')) return;
    o.disconnect();
    align();
  });
  obs.observe(accordion, { childList: true, subtree: true });

  align(); // на случай если аккордеон уже заполнен
  window.addEventListener('resize', align, { passive: true });
})();
</script>
